version: "3.9"

# ════════════════════════════════════════════════════════════════════════════════
# docker-compose.yml  —  Local development only
# Production runs on: Render (API) + Supabase (DB) + Upstash (Redis) + Vercel (Web)
# ════════════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL (local dev — mirrors Supabase schema) ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: traderai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traderai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traderai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-traderai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traderai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (local dev — mirrors Upstash behavior) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: traderai_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (local dev vector store) ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: traderai_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=true

  # ── FastAPI Backend (dev mode — hot reload) ────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile         # Use local dev Dockerfile (not Dockerfile.render)
    container_name: traderai_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-traderai}:${POSTGRES_PASSWORD:-traderai_secret}@postgres:5432/${POSTGRES_DB:-traderai_db}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-traderai}:${POSTGRES_PASSWORD:-traderai_secret}@postgres:5432/${POSTGRES_DB:-traderai_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app      # Mount for hot-reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  # ── Celery Worker (dev) ────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: traderai_celery
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-traderai}:${POSTGRES_PASSWORD:-traderai_secret}@postgres:5432/${POSTGRES_DB:-traderai_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - redis
      - postgres
    volumes:
      - ../apps/api:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q ai_tasks,market_tasks

  # ── Celery Beat Scheduler (dev) ────────────────────────────────────────────
  celery_beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: traderai_celery_beat
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-traderai}:${POSTGRES_PASSWORD:-traderai_secret}@postgres:5432/${POSTGRES_DB:-traderai_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
    depends_on:
      - redis
    volumes:
      - ../apps/api:/app
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Flower: Celery monitoring UI ───────────────────────────────────────────
  flower:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: traderai_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=admin:flowerpass

volumes:
  postgres_data:
  redis_data:
  chroma_data:
