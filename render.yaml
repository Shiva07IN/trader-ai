# ════════════════════════════════════════════════════════════════════════════════
# render.yaml  —  TraderAI Production Deployment on Render
# Docs: https://render.com/docs/render-yaml-spec
# ════════════════════════════════════════════════════════════════════════════════

services:
  # ── Web Service: FastAPI Backend ───────────────────────────────────────────
  - type: web
    name: traderai-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile.render
    dockerContext: ./apps/api
    region: singapore      # Closest to India (low latency for NSE/BSE data)
    plan: starter          # $7/mo — 512MB RAM, 0.5 CPU | upgrade to standard for prod
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    # ── Environment Variables ──────────────────────────────────────────────────
    envVars:
      # App
      - key: APP_NAME
        value: TraderAI
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_VERSION
        value: "1.0.0"

      # Secrets (set values in Render dashboard — never commit)
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure secret
      - key: JWT_SECRET_KEY
        generateValue: true

      # Database — Supabase PostgreSQL
      - key: DATABASE_URL
        sync: false                # Set manually in dashboard
      - key: DATABASE_URL_SYNC
        sync: false

      # Redis — Upstash
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

      # AI — OpenRouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: google/gemma-3-27b-it:free

      # Auth
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # CORS — Vercel frontend URL
      - key: CORS_ORIGINS
        value: '["https://traderai.vercel.app","https://www.traderai.in"]'

      # Rate limiting
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: RATE_LIMIT_AI_PER_MINUTE
        value: "5"

      # Google OAuth (optional, for social login)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # External APIs (optional)
      - key: NEWS_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false

  # ── Background Worker: Celery ──────────────────────────────────────────────
  - type: worker
    name: traderai-worker
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile.render
    dockerContext: ./apps/api
    region: singapore
    plan: starter
    branch: main
    autoDeploy: true
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 -Q ai_tasks,market_tasks

    envVars:
      - fromService:
          name: traderai-api
          type: web
          envVarKey: DATABASE_URL
        key: DATABASE_URL
      - fromService:
          name: traderai-api
          type: web
          envVarKey: REDIS_URL
        key: REDIS_URL
      - fromService:
          name: traderai-api
          type: web
          envVarKey: CELERY_BROKER_URL
        key: CELERY_BROKER_URL
      - fromService:
          name: traderai-api
          type: web
          envVarKey: CELERY_RESULT_BACKEND
        key: CELERY_RESULT_BACKEND
      - fromService:
          name: traderai-api
          type: web
          envVarKey: OPENROUTER_API_KEY
        key: OPENROUTER_API_KEY
      - fromService:
          name: traderai-api
          type: web
          envVarKey: SECRET_KEY
        key: SECRET_KEY
      - key: ENVIRONMENT
        value: production

  # ── Cron Job: Market Data Sync (every 5 min on weekdays) ──────────────────
  - type: cron
    name: traderai-market-sync
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile.render
    dockerContext: ./apps/api
    region: singapore
    plan: starter
    branch: main
    schedule: "*/5 3-10 * * 1-5"   # 3–10 UTC = 8:30–15:30 IST (NSE trading hours)
    dockerCommand: python -m app.workers.tasks.market_sync

    envVars:
      - fromService:
          name: traderai-api
          type: web
          envVarKey: DATABASE_URL
        key: DATABASE_URL
      - fromService:
          name: traderai-api
          type: web
          envVarKey: REDIS_URL
        key: REDIS_URL

  # ── Cron Job: News & Sentiment Feed (every 30 min) ────────────────────────
  - type: cron
    name: traderai-news-sync
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile.render
    dockerContext: ./apps/api
    region: singapore
    plan: starter
    branch: main
    schedule: "*/30 * * * *"
    dockerCommand: python -m app.workers.tasks.news_sync

    envVars:
      - fromService:
          name: traderai-api
          type: web
          envVarKey: DATABASE_URL
        key: DATABASE_URL
      - fromService:
          name: traderai-api
          type: web
          envVarKey: REDIS_URL
        key: REDIS_URL
      - fromService:
          name: traderai-api
          type: web
          envVarKey: NEWS_API_KEY
        key: NEWS_API_KEY
